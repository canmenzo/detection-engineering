    expect: fire          # Invoke-Obfuscation "encoding" menu output (EID 4104)
    repo: Yamato-Security/hayabusa-sample-evtx
    commit: 0845333ecb4afcf64c55c6e10946383f168f308c
    path: DeepBlueCLI/Powershell-Invoke-Obfuscation-encoding-menu.evtx
    sha256: B1D7C3411053A4190C93657265679958228B4BDB97652984C1564A67FCFAB167

  - name: negative_no_scriptblock
