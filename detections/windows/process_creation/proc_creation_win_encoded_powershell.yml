title: Encoded PowerShell Command Line
id: 6e1d6c2f-3b8a-4c4e-9b2a-1f0c7a5d9e21
status: experimental
description: >
  Detects PowerShell execution with an encoded command argument
  (-EncodedCommand / -enc). Adversaries base64-encode commands to obfuscate
  intent and evade command-line logging inspection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://learn.microsoft.com/powershell/module/microsoft.powershell.core/about/about_powershell_exe
author: Can Ozmen
date: 2026-06-23
modified: 2026-06-23
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\powershell.exe'
    - OriginalFileName: 'PowerShell.EXE'
  selection_enc:
    CommandLine|contains:
      - ' -enc '
      - ' -encodedcommand '
      - ' -ec '
  condition: selection_img and selection_enc
falsepositives:
  - Legitimate administrative scripts and software deployment tools that pass
    encoded commands. Baseline before enabling at high severity.
level: high
