title: Scheduled Task Created
id: 7b4c2f81-9d3e-4a16-b5c8-1e6f2a9d4c70
status: experimental
description: >
  Detects creation of a Windows scheduled task (EID 4698). Scheduled tasks are a
  common execution and persistence mechanism: attackers register tasks to run
  payloads at logon, on a timer, or as SYSTEM. Remote task creation (ATexec) and
  tasks pointing at script interpreters or temp paths are especially suspect.
references:
  - https://attack.mitre.org/techniques/T1053/005/
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventID=4698
author: Can Ozmen
date: 2026-06-24
modified: 2026-06-24
tags:
  - attack.execution
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1053.005
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4698
  condition: selection
falsepositives:
  - Software installers and management agents register tasks legitimately.
    Baseline TaskName and the author account; alert on tasks created by
    non-administrative or remote sessions.
level: medium
